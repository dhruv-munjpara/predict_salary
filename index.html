<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Salary Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 300px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #2d3748;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Salary Predictor</h2>

        <input type="number" id="experience" placeholder="Enter years of experience" min="0" step="0.1">

        <button onclick="predictSalary()">Predict Salary</button>

        <div class="result" id="result"></div>
    </div>

    <script>
        async function predictSalary() {
            const exp = document.getElementById("experience").value;
            const resultDiv = document.getElementById("result");

            if (!exp) {
                resultDiv.innerHTML = "⚠️ Please enter experience!";
                return;
            }

            try {
                // 🔥 Replace this URL with your FastAPI endpoint
                const response = await fetch("http://127.0.0.1:8000/predict", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        YearsExperience: parseFloat(exp)
                    })
                });

                const data = await response.json();

                document.getElementById("result").innerText =
                    "Predicted Salary: ₹ " + data.PredictedSalary.toFixed(2);

            } catch (error) {
                resultDiv.innerHTML = "❌ Error connecting to API";
                console.error(error);
            }
        }
    </script>

</body>

</html>
